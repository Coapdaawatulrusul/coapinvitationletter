<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>COAP | Da'awatul-Rusul – Invitation Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a2f26 0%, #1a4a3a 100%);
            font-family: 'Inter', system-ui, sans-serif;
        }
        .letter-content {
            white-space: pre-line;
            font-family: 'Georgia', serif;
            line-height: 1.6;
        }
        .admin-table input, .admin-table select {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 6px 8px;
            width: 100%;
            font-size: 0.85rem;
        }
        .admin-table th {
            background: #2b5a48;
            color: white;
            padding: 10px 6px;
            font-weight: 600;
        }
        .admin-table td {
            padding: 6px;
            vertical-align: middle;
            border-bottom: 1px solid #e2e2e2;
        }
        .admin-table tr:hover {
            background: #f9f9f0;
        }
    </style>
</head>
<body class="min-h-screen p-4 flex items-center justify-center">

<div class="max-w-7xl w-full mx-auto">
    <!-- Header with full branding -->
    <div class="text-center mb-6">
        <div class="inline-block bg-white/10 backdrop-blur rounded-full px-6 py-3 shadow-lg border border-white/20">
            <h1 class="text-3xl md:text-4xl font-bold tracking-wide bg-gradient-to-r from-[#f9e0a0] to-[#d4af37] bg-clip-text text-transparent">COAP | DA'AWATUL-RUSUL</h1>
            <p class="text-[#f3d382] text-sm uppercase tracking-wider">Sharing and Reviving The Truth</p>
            <p class="text-[#e6d5b3] text-xs italic">Empowering Da'wah through technology</p>
        </div>
    </div>

    <!-- USER LOGIN CARD -->
    <div id="userLoginCard" class="bg-white/95 rounded-2xl shadow-xl p-6 border border-amber-200/50 max-w-md mx-auto">
        <div class="text-center mb-4">
            <i class="fas fa-lock text-3xl text-[#c7a252]"></i>
            <h2 class="text-xl font-bold text-[#2b5a48]">Access Your Invitation</h2>
        </div>
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-[#2b5a48] font-semibold text-sm">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 rounded-full border border-amber-200 focus:outline-none focus:ring-2 focus:ring-[#c7a252]" placeholder="e.g., COAP001">
            </div>
            <div>
                <label class="block text-[#2b5a48] font-semibold text-sm">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 rounded-full border border-amber-200 focus:outline-none focus:ring-2 focus:ring-[#c7a252]" placeholder="Your password">
            </div>
            <button type="submit" class="w-full bg-[#2b5a48] hover:bg-[#1e4538] text-white font-bold py-2 rounded-full transition">Unlock Invitation</button>
            <div id="loginError" class="text-red-600 text-sm text-center hidden"></div>
        </form>
        <div class="mt-4 text-center">
            <button id="adminBtn" class="text-sm text-amber-700 bg-amber-100 px-4 py-1 rounded-full"><i class="fas fa-shield-alt mr-1"></i> C.ADMIN</button>
        </div>
    </div>

    <!-- INVITATION LETTER -->
    <div id="letterCard" class="bg-white/95 rounded-2xl shadow-xl p-6 border border-amber-200/50 hidden max-w-4xl mx-auto mt-6">
        <div id="letterContent" class="letter-content bg-[#fefaf2] p-5 rounded-xl border-l-8 border-[#c7a252] text-gray-800 text-sm md:text-base"></div>
        <div class="mt-4 flex flex-wrap gap-3 justify-between items-center">
            <button id="logoutBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-1 rounded-full text-sm"><i class="fas fa-arrow-left mr-1"></i> Back</button>
            <div class="text-xs text-amber-700 bg-amber-50 px-3 py-1 rounded-full">Response to: callingoftheallprophetsmw@gmail.com</div>
        </div>
        <div class="mt-3 flex gap-3 justify-center">
            <button id="sendAcceptBtn" class="bg-[#2b5a48] hover:bg-[#1e4538] text-white font-bold py-1.5 px-6 rounded-full"><i class="fas fa-check-circle mr-1"></i> Accept</button>
            <button id="sendRejectBtn" class="bg-red-700 hover:bg-red-800 text-white font-bold py-1.5 px-6 rounded-full"><i class="fas fa-times-circle mr-1"></i> Decline</button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel" class="bg-white/95 rounded-2xl shadow-xl p-6 border border-amber-200/50 hidden mt-6">
        <div class="flex flex-wrap justify-between items-center gap-3 mb-4">
            <h2 class="text-xl font-bold text-[#2b5a48]"><i class="fas fa-user-shield mr-2"></i>Admin Dashboard</h2>
            <div class="flex gap-2">
                <button id="closeAdminBtn" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-full text-sm"><i class="fas fa-times mr-1"></i>Close</button>
            </div>
        </div>

        <!-- Search & Tools -->
        <div class="flex flex-wrap gap-3 justify-between items-center mb-4">
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="Search by name or username..." class="pl-9 pr-3 py-1.5 border rounded-full text-sm w-64">
            </div>
            <div class="flex gap-2">
                <button id="exportCsvBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded-full text-sm"><i class="fas fa-download mr-1"></i>Export CSV</button>
                <label class="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded-full text-sm cursor-pointer"><i class="fas fa-upload mr-1"></i>Import CSV<input type="file" id="importCsvInput" accept=".csv" class="hidden"></label>
                <button id="addUserBtn" class="bg-green-700 hover:bg-green-800 text-white px-3 py-1 rounded-full text-sm"><i class="fas fa-plus mr-1"></i>Add</button>
                <button id="resetDefaultBtn" class="bg-gray-600 hover:bg-gray-700 text-white px-3 py-1 rounded-full text-sm"><i class="fas fa-undo-alt mr-1"></i>Reset</button>
            </div>
        </div>

        <!-- User Table -->
        <div class="overflow-x-auto">
            <table class="admin-table w-full text-sm border-collapse">
                <thead>
                    <tr>
                        <th>Username</th><th>Password</th><th>Name</th><th>Department</th><th>Position</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
        <div class="mt-3 flex justify-between items-center text-xs text-gray-600">
            <span id="userCount"></span>
            <span id="lastSaved"></span>
        </div>
        <div class="mt-2 flex justify-end">
            <button id="saveAllBtn" class="bg-[#2b5a48] hover:bg-[#1e4538] text-white px-6 py-1.5 rounded-full text-sm"><i class="fas fa-save mr-1"></i>Save All Changes</button>
        </div>
        <div id="adminMsg" class="mt-2 text-sm text-center text-green-700"></div>
    </div>
</div>

<script>
    // ==================== DEFAULT ORGANIZATION DATA (50 users) ====================
    const defaultDepartments = [
        { name: "Governing Board & Shura Council", positions: ["Chairman", "Vice Chairman", "Board Secretary", "Treasurer"] },
        { name: "Executive Management", positions: ["Secretary General", "Chief Executive Officer (CEO)", "Executive Director"] },
        { name: "Religious Leadership (Muftis & Imams)", positions: ["Grand Mufti", "Senior Mufti", "Chief Imam", "Qazi", "Resident Imam"] },
        { name: "Religious Affairs & Iftaa'", positions: ["Director of Religious Affairs", "Fatwa Specialist", "Islamic Researcher", "Halal Certification Officer"] },
        { name: "Da'wah & Outreach", positions: ["Director of Da'wah", "Da'wah Officer", "Outreach Coordinator", "Interfaith Specialist", "Field Da'wah Lead"] },
        { name: "Education & Youth", positions: ["Education Director", "Youth Manager", "Head of Quranic Studies", "Curriculum Developer", "Student Counselor"] },
        { name: "Finance & Administration", positions: ["Finance Director", "Senior Accountant", "HR & Admin Manager", "Procurement Officer", "Internal Auditor"] },
        { name: "Social Services & Charity", positions: ["Social Services Director", "Zakat Officer", "Case Manager", "Food Bank Coordinator", "Orphan Sponsorship Lead"] },
        { name: "Public Relations & Media", positions: ["PR Director", "Media Officer", "Digital Content Manager", "Press Secretary", "Graphic Designer"] },
        { name: "Women's & Family Affairs", positions: ["Women's Affairs Coordinator", "Family Counselor", "Program Manager (Women)", "Maternal Health Officer"] },
        { name: "Administrative & Support (IT, Legal, HR)", positions: ["IT Manager", "Legal Advisor", "HR Specialist", "Compliance Officer", "Facilities Coordinator"] },
        { name: "Specialized Committees", positions: ["Fatwa Committee Chair", "Hilal Coordinator", "Strategic Planning Lead", "Crisis Advisor"] },
        { name: "Regional & Branch Offices", positions: ["Provincial Mufti", "Branch Manager", "Regional Da'wah Coordinator", "Local Outreach Officer", "Zakat Lead"] }
    ];

    function generateDefaultUsers() {
        let users = [], counter = 1;
        for (const dept of defaultDepartments) {
            for (const pos of dept.positions) {
                let name = "— Name to be updated —";
                // Pre-filled example name for Media Officer
                if (dept.name === "Public Relations & Media" && pos === "Media Officer") {
                    name = "Abou Taqwatuh Ibrahim Ibn Muhammad Ali Chigonia";
                }
                users.push({
                    username: `COAP${counter.toString().padStart(3, '0')}`,
                    password: `co@pabxy26ab${counter.toString().padStart(2, '0')}`,
                    name: name,
                    department: dept.name,
                    position: pos
                });
                counter++;
            }
        }
        return users;
    }

    let allUsers = [];
    let userMap = new Map();
    let lastSavedTime = "";

    function loadUsers() {
        const stored = localStorage.getItem('coap_users');
        if (stored) {
            allUsers = JSON.parse(stored);
        } else {
            allUsers = generateDefaultUsers();
            localStorage.setItem('coap_users', JSON.stringify(allUsers));
        }
        userMap.clear();
        allUsers.forEach(u => userMap.set(u.username, u));
        updateLastSavedDisplay();
        updateUserCount();
    }

    function saveUsers(showMsg = true) {
        localStorage.setItem('coap_users', JSON.stringify(allUsers));
        userMap.clear();
        allUsers.forEach(u => userMap.set(u.username, u));
        lastSavedTime = new Date().toLocaleTimeString();
        updateLastSavedDisplay();
        if (showMsg) showAdminMessage("All changes saved!", "green");
        renderAdminTable();
    }

    function updateLastSavedDisplay() {
        document.getElementById('lastSaved').innerText = lastSavedTime ? `Last saved: ${lastSavedTime}` : "Not saved yet";
    }
    function updateUserCount() {
        document.getElementById('userCount').innerText = `Total users: ${allUsers.length}`;
    }
    function showAdminMessage(msg, color) {
        const div = document.getElementById('adminMsg');
        div.innerText = msg;
        div.className = `mt-2 text-sm text-center text-${color}-700`;
        setTimeout(() => div.innerText = '', 2500);
    }

    // Render admin table with search filter
    function renderAdminTable() {
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = '';
        const filter = document.getElementById('searchInput')?.value.toLowerCase() || "";
        const filtered = allUsers.filter(u => u.username.toLowerCase().includes(filter) || u.name.toLowerCase().includes(filter));
        filtered.forEach((user) => {
            const originalIdx = allUsers.findIndex(u => u.username === user.username);
            const row = tbody.insertRow();
            row.insertCell(0).innerText = user.username;
            // Password
            const pwdCell = row.insertCell(1);
            const pwdInput = document.createElement('input');
            pwdInput.type = "text";
            pwdInput.value = user.password;
            pwdInput.addEventListener('change', (e) => { allUsers[originalIdx].password = e.target.value; });
            pwdCell.appendChild(pwdInput);
            // Name
            const nameCell = row.insertCell(2);
            const nameInput = document.createElement('input');
            nameInput.value = user.name;
            nameInput.addEventListener('change', (e) => { allUsers[originalIdx].name = e.target.value; });
            nameCell.appendChild(nameInput);
            // Department
            const deptCell = row.insertCell(3);
            const deptInput = document.createElement('input');
            deptInput.value = user.department;
            deptInput.addEventListener('change', (e) => { allUsers[originalIdx].department = e.target.value; });
            deptCell.appendChild(deptInput);
            // Position
            const posCell = row.insertCell(4);
            const posInput = document.createElement('input');
            posInput.value = user.position;
            posInput.addEventListener('change', (e) => { allUsers[originalIdx].position = e.target.value; });
            posCell.appendChild(posInput);
            // Delete button
            const delCell = row.insertCell(5);
            const delBtn = document.createElement('button');
            delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
            delBtn.className = "bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded text-xs";
            delBtn.onclick = () => {
                if (confirm(`Delete ${user.username}?`)) {
                    allUsers.splice(originalIdx, 1);
                    renderAdminTable();
                    showAdminMessage(`Deleted ${user.username}. Save to persist.`, "orange");
                }
            };
            delCell.appendChild(delBtn);
        });
        updateUserCount();
    }

    function addNewUser() {
        let maxNum = 0;
        allUsers.forEach(u => {
            let num = parseInt(u.username.replace('COAP',''));
            if (!isNaN(num) && num > maxNum) maxNum = num;
        });
        const newNum = maxNum + 1;
        const newUsername = `COAP${newNum.toString().padStart(3,'0')}`;
        allUsers.push({
            username: newUsername,
            password: `co@pabxy26ab${newNum.toString().padStart(2,'0')}`,
            name: "New User",
            department: "New Department",
            position: "New Position"
        });
        renderAdminTable();
        showAdminMessage(`Added ${newUsername}. Save to persist.`, "blue");
    }

    function exportToCSV() {
        const headers = ["username","password","name","department","position"];
        const rows = allUsers.map(u => [u.username, u.password, u.name, u.department, u.position]);
        const csvContent = [headers, ...rows].map(row => row.map(cell => `"${cell}"`).join(",")).join("\n");
        const blob = new Blob([csvContent], {type: "text/csv"});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `coap_users_${new Date().toISOString().slice(0,19)}.csv`;
        link.click();
        showAdminMessage("CSV exported!", "green");
    }

    function importCSV(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const text = e.target.result;
            const lines = text.split("\n");
            if (lines.length < 2) return;
            const newUsers = [];
            for (let i=1; i<lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                const parts = line.match(/(".*?"|[^,]+)(,|$)/g).map(p => p.replace(/^"|"$/g, '').replace(/,$/,''));
                if (parts.length >= 5) {
                    newUsers.push({
                        username: parts[0],
                        password: parts[1],
                        name: parts[2],
                        department: parts[3],
                        position: parts[4]
                    });
                }
            }
            if (newUsers.length) {
                allUsers = newUsers;
                saveUsers(true);
                renderAdminTable();
                showAdminMessage(`Imported ${newUsers.length} users.`, "green");
            } else {
                showAdminMessage("Invalid CSV format", "red");
            }
        };
        reader.readAsText(file);
    }

    function resetToDefault() {
        if (confirm("Reset to original 50 users? All current changes will be lost.")) {
            allUsers = generateDefaultUsers();
            saveUsers(true);
            renderAdminTable();
        }
    }

    // ---------- Invitation Letter & Email ----------
    function generateLetter(user) {
        const recipientName = (user.name && user.name !== "— Name to be updated —") ? user.name : user.position;
        return `📅 8th April 2026 | 20th Rajab 1447

✨ To: ${recipientName}
📂 Department: ${user.department}
🪪 Position: ${user.position}

From: The Shura Council & Executive Office
COAP | Da'awatul-Rusul – Sharing and Reviving The Truth

بسم الله الرحمن الرحيم

Assalamu alaykum wa rahmatullahi wa barakatuh,

It is with profound honor to invite you as a member of the COAP leadership team. Your appointment as **${user.position}** in the **${user.department}** department is vital for our sacred mission: **Sharing and Reviving The Truth**.

🌟 Position Overview
• Lead all strategic and operational activities within ${user.department}.
• Ensure alignment with Islamic principles and COAP's global vision.
• Submit regular progress reports to the Shura Council.
• Foster inter‑departmental collaboration.

📌 Expectations
• Attend quarterly strategy sessions (virtual or in‑person).
• Contribute to annual departmental plans and budgets.
• Mentor junior staff and volunteers.

🎁 Benefits
• Official COAP Leadership Certificate.
• Access to global Islamic scholarly networks.
• Eternal reward (ajr) of serving the Ummah.

📅 Next Steps
1. Click "Accept" or "Decline" below.
2. Upon acceptance, you will receive the Leadership Handbook within 48 hours.

We pray Allah grants you success in this noble service.

Yours in sincere brotherhood,

Abou Zubāir Farouq Ibn Njalale
Secretary General, COAP

🌿 "Call to the way of your Lord with wisdom and beautiful preaching." (Qur'an 16:125)`;
    }

    let currentUser = null;

    // DOM elements
    const userLoginCard = document.getElementById('userLoginCard');
    const letterCard = document.getElementById('letterCard');
    const adminPanel = document.getElementById('adminPanel');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const letterContent = document.getElementById('letterContent');
    const logoutBtn = document.getElementById('logoutBtn');
    const sendAcceptBtn = document.getElementById('sendAcceptBtn');
    const sendRejectBtn = document.getElementById('sendRejectBtn');
    const adminBtn = document.getElementById('adminBtn');
    const closeAdminBtn = document.getElementById('closeAdminBtn');
    const saveAllBtn = document.getElementById('saveAllBtn');
    const resetDefaultBtn = document.getElementById('resetDefaultBtn');
    const addUserBtn = document.getElementById('addUserBtn');
    const exportCsvBtn = document.getElementById('exportCsvBtn');
    const importCsvInput = document.getElementById('importCsvInput');
    const searchInput = document.getElementById('searchInput');

    loadUsers();

    function showAdminLogin() {
        const pwd = prompt("Enter admin password:");
        if (pwd === "Admin@COAP2026") {
            userLoginCard.classList.add('hidden');
            adminPanel.classList.remove('hidden');
            renderAdminTable();
            if (searchInput) searchInput.addEventListener('input', () => renderAdminTable());
        } else if (pwd) alert("Wrong password");
    }

    adminBtn.onclick = showAdminLogin;
    closeAdminBtn.onclick = () => {
        adminPanel.classList.add('hidden');
        userLoginCard.classList.remove('hidden');
    };
    saveAllBtn.onclick = () => saveUsers(true);
    resetDefaultBtn.onclick = resetToDefault;
    addUserBtn.onclick = addNewUser;
    exportCsvBtn.onclick = exportToCSV;
    importCsvInput.onchange = (e) => { if(e.target.files[0]) importCSV(e.target.files[0]); };

    loginForm.onsubmit = (e) => {
        e.preventDefault();
        const enteredUsername = usernameInput.value.trim();
        const enteredPassword = passwordInput.value.trim();
        const user = userMap.get(enteredUsername);
        if (user && user.password === enteredPassword) {
            currentUser = user;
            loginError.classList.add('hidden');
            letterContent.innerText = generateLetter(user);
            userLoginCard.classList.add('hidden');
            letterCard.classList.remove('hidden');
            passwordInput.value = '';
        } else {
            loginError.classList.remove('hidden');
            loginError.innerText = 'Invalid username or password.';
        }
    };
    logoutBtn.onclick = () => {
        letterCard.classList.add('hidden');
        userLoginCard.classList.remove('hidden');
        currentUser = null;
        loginError.classList.add('hidden');
    };
    function sendEmail(responseType) {
        if (!currentUser) return;
        const name = currentUser.name !== "— Name to be updated —" ? currentUser.name : currentUser.position;
        const subject = `${responseType === 'accept' ? 'Acceptance' : 'Decline'} - ${name} (${currentUser.department})`;
        const body = `I, ${name} (${currentUser.department} - ${currentUser.position}), ${responseType === 'accept' ? 'ACCEPT' : 'DECLINE'} the invitation.\n\nSent via official COAP portal.`;
        window.location.href = `mailto:callingoftheallprophetsmw@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        setTimeout(() => alert("Email client opened. Please send your response."), 100);
    }
    sendAcceptBtn.onclick = () => sendEmail('accept');
    sendRejectBtn.onclick = () => sendEmail('decline');

    console.log("✅ COAP system ready. Admin password: Admin@COAP2026");
</script>
</body>
</html>
